<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>价盘管理表</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","微软雅黑",sans-serif;background:#f5f6f8;color:#333}
.toolbar{background:#fff;padding:10px 16px;border-bottom:1px solid #ddd;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.toolbar h1{font-size:17px;color:#1F4E79}
.toolbar input,.toolbar select,.toolbar button,.toolbar a.btn{padding:6px 10px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;text-decoration:none}
.toolbar button,.toolbar a.btn{background:#1F4E79;color:#fff;border-color:#1F4E79;cursor:pointer;display:inline-block}
.toolbar button:hover,.toolbar a.btn:hover{opacity:.9}
.toolbar .btn-e{background:#2E7D32;border-color:#2E7D32}
.toolbar .btn-i{background:#C55A11;border-color:#C55A11}
.toolbar .btn-s{background:#1A73E8;border-color:#1A73E8}
.stats{font-size:12px;color:#888;margin-left:auto}
.wrap{overflow-x:auto;padding:10px}
#tbl{border-collapse:collapse;font-size:12px;width:100%;min-width:1500px}
#tbl th{padding:8px 9px;font-size:11px;font-weight:600;white-space:nowrap;border:1px solid #b8bcc4}
#tbl td{padding:6px 9px;border:1px solid #e0e0e0;white-space:nowrap}
#tbl th.cb{background:#1F4E79;color:#fff}
#tbl th.co{background:#C55A11;color:#fff}
#tbl th.cg{background:#2E7D32;color:#fff}
#tbl th.c6{background:#C55A11;color:#fff}
#tbl th.cby{background:#D42020;color:#fff}
#tbl th.cms{background:#E05336;color:#fff}
#tbl th.cux{background:#7B2D8B;color:#fff}
#tbl th.clj{background:#1A73E8;color:#fff}
#tbl th.cpx{background:#00838F;color:#fff}
#tbl th.ccn{background:#2E7D32;color:#fff}
#tbl tr:nth-child(even) td{background:#f8f9fb}
#tbl tr:nth-child(odd) td{background:#fff}
#tbl tr:hover td{background:#e8f0fe!important}
.ld{text-align:center;padding:40px;color:#888}

/* 导入弹窗 */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:999;justify-content:center;align-items:center}
.modal.on{display:flex}
.modal-box{background:#fff;border-radius:8px;padding:24px;width:680px;max-width:95%;max-height:85vh;overflow:auto;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal-box h2{font-size:16px;color:#1F4E79;margin-bottom:12px}
.modal-box textarea{width:100%;height:140px;border:1px solid #d9d9d9;border-radius:4px;padding:10px;font-family:monospace;font-size:12px;resize:vertical}
.modal-box .row{display:flex;gap:10px;margin-top:12px;align-items:center}
.modal-box .row label{font-size:13px;white-space:nowrap}
.modal-box .row input,.modal-box .row select{flex:1;padding:6px 10px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px}
.modal-box .hint{font-size:12px;color:#888;margin-top:6px}
.modal-box .result{background:#f8f9fb;border:1px solid #e0e0e0;border-radius:4px;padding:10px;margin-top:12px;font-size:12px;max-height:200px;overflow:auto}
.modal-box .btns{display:flex;gap:10px;margin-top:16px;justify-content:flex-end}
</style>
</head>
<body>
<div class="toolbar">
<h1>网店产品价盘管理表</h1>
<button class="btn-i" onclick="openImport()">导入活动数据</button>
<button class="btn-s" onclick="saveAndPush()">保存到线上</button>
<a href="price-matrix.xlsx" class="btn btn-e">导出Excel</a>
<input id="q" placeholder="搜索商品ID/编码/规格..." oninput="refresh()">
<select id="f" onchange="refresh()">
<option value="">全部活动</option><option value="9">618大促</option><option value="10">百亿补贴</option><option value="11">淘宝秒杀</option><option value="12">天猫U先</option><option value="13">超级立减</option><option value="14">品牌新享</option>
</select>
<span class="stats" id="st"></span>
</div>
<div class="wrap"><table id="tbl"><tbody></tbody></table></div>
<div class="ld" id="ld">正在加载数据...</div>

<!-- 导入面板 -->
<div class="modal" id="importModal">
<div class="modal-box">
<h2>导入活动报名数据</h2>
<p style="font-size:12px;color:#888;margin-bottom:8px">书签抓取后 Ctrl+V 粘贴 JSON，页面自动合并到价盘表</p>
<textarea id="importJSON" placeholder='粘贴书签抓取的JSON...' oninput="previewImport()"></textarea>
<div class="row">
<label>活动类型:</label>
<select id="importType"><option value="auto">自动识别</option><option value="618大促">618大促</option><option value="百亿补贴">百亿补贴</option><option value="淘宝秒杀">淘宝秒杀</option><option value="天猫U先">天猫U先</option><option value="超级立减">超级立减</option><option value="品牌新享">品牌新享</option><option value="顺手买一件">顺手买一件</option></select>
<label>加速类型(品牌新享时):</label>
<select id="importAcc"><option value="auto">自动</option><option value="超级新客加速">新客加速</option><option value="超级老客加速">老客加速</option></select>
</div>
<div class="result" id="importPreview" style="display:none"></div>
<div class="btns">
<button onclick="closeImport()" style="background:#888">取消</button>
<button onclick="doImport()" style="background:#C55A11;color:#fff">合并到本地</button>
</div>
</div>
</div>

<!-- 保存结果提示 -->
<div class="modal" id="saveModal">
<div class="modal-box">
<h2>保存完成</h2>
<div class="result" id="saveResult"></div>
<div class="btns"><button onclick="document.getElementById('saveModal').classList.remove('on')">关闭</button></div>
</div>
</div>

<script>
var C=[
{k:'商品ID',l:'商品ID',c:'cb'},{k:'SKUID',l:'SKUID',c:'cb'},{k:'商品编码',l:'商品编码',c:'cb'},{k:'商品规格名称',l:'商品规格名称',c:'cb'},
{k:'品牌供价(26年)',l:'品牌供价',c:'co',m:1},{k:'官旗售价',l:'官旗售价',c:'co',m:1},{k:'管控底价',l:'管控底价',c:'co',m:1},
{k:'页面价格',l:'页面价格',c:'cg',m:1},{k:'官方立减金额(15%)',l:'官方立减',c:'cg',m:1},{k:'618大促券后价',l:'618大促券后价',c:'c6',m:1},
{k:'百亿补贴活动价',l:'百亿补贴活动价',c:'cby',m:1},{k:'淘宝秒杀供货价',l:'淘宝秒杀供货价',c:'cms',m:1},{k:'天猫U先活动价',l:'天猫U先活动价',c:'cux',m:1},
{k:'超级立减活动价',l:'超级立减活动价',c:'clj',m:1},{k:'品牌新享加速类型',l:'品牌新享加速',c:'cpx'},{k:'品牌新享费率%',l:'品牌新享费率',c:'cpx'},
{k:'参与活动数',l:'参与数',c:'ccn'}];
var D=[];

function fmt(v,c){if(v==null||v==='')return'';if(c.m&&typeof v==='number')return v.toFixed(2);if(c.m&&!isNaN(parseFloat(v)))return parseFloat(v).toFixed(2);return v}

function refresh(){
var q=document.getElementById('q').value.toLowerCase(),fc=document.getElementById('f').value,rows=D;
if(q)rows=rows.filter(function(r){return C.some(function(c){var v=r[c.k];return v!=null&&String(v).toLowerCase().indexOf(q)>=0})});
if(fc){var ci=parseInt(fc);rows=rows.filter(function(r){return r[C[ci].k]!=null&&r[C[ci].k]!==''})}
var h='';
h+='<tr>';C.forEach(function(c){h+='<th class="'+c.c+'">'+c.l+'</th>'});h+='</tr>';
rows.forEach(function(r){h+='<tr>';C.forEach(function(c,i){var v=fmt(r[c.k],c);h+='<td>'+(c.m&&v!==''?'¥'+v:v)+'</td>'});h+='</tr>'});
document.getElementById('tbl').innerHTML='<tbody>'+h+'</tbody>';
document.getElementById('st').textContent=rows.length+' / '+D.length+' 条';
}

function openImport(){document.getElementById('importModal').classList.add('on')}
function closeImport(){document.getElementById('importModal').classList.remove('on')}

var importPreviewData=[];

function previewImport(){
  var raw=document.getElementById('importJSON').value.trim();
  if(!raw){document.getElementById('importPreview').style.display='none';return}
  try{
    var items=JSON.parse(raw);
    if(!Array.isArray(items))items=[items];
    importPreviewData=items;
    var pidCol='618大促券后价';
    var actCol='品牌新享加速类型';
    var stats='共 '+items.length+' 条记录, 涉及 '+[...new Set(items.map(function(i){return i.商品ID}))].length+' 个商品';
    document.getElementById('importPreview').innerHTML=stats;
    document.getElementById('importPreview').style.display='block';
  }catch(e){
    document.getElementById('importPreview').innerHTML='JSON格式错误: '+e.message;
    document.getElementById('importPreview').style.display='block';
    importPreviewData=[];
  }
}

function doImport(){
  if(importPreviewData.length===0)return alert('请先粘贴有效的JSON');
  
  var actType=document.getElementById('importType').value;
  var accType=document.getElementById('importAcc').value;
  var aid='618大促券后价';
  
  // 确定目标列
  if(actType==='auto'){
    var sample=importPreviewData[0]||{};
    var an=sample.活动名称||'';
    if(an.indexOf('618')>=0||an.indexOf('大促')>=0){actType='618大促';aid='618大促券后价'}
    else if(an.indexOf('百亿补贴')>=0){actType='百亿补贴';aid='百亿补贴活动价'}
    else if(an.indexOf('秒杀')>=0){actType='淘宝秒杀';aid='淘宝秒杀供货价'}
    else if(an.indexOf('U先')>=0||an.indexOf('派样')>=0){actType='天猫U先';aid='天猫U先活动价'}
    else if(an.indexOf('立减')>=0){actType='超级立减';aid='超级立减活动价'}
    else if(an.indexOf('新享')>=0||an.indexOf('新客')>=0||an.indexOf('老客')>=0){actType='品牌新享';aid='品牌新享加速类型'}
    else{actType='未知'}
  }
  
  if(actType==='618大促')aid='618大促券后价';
  else if(actType==='百亿补贴')aid='百亿补贴活动价';
  else if(actType==='淘宝秒杀')aid='淘宝秒杀供货价';
  else if(actType==='天猫U先')aid='天猫U先活动价';
  else if(actType==='超级立减')aid='超级立减活动价';
  else if(actType==='品牌新享')aid='品牌新享加速类型';
  
  var colKey=C.find(function(c){return c.l===aid||c.l.indexOf(aid.replace(/[券后价|活动价|供货价]/g,''))>=0});
  if(!colKey)colKey=C[9]; // default to 618
  
  var updated=0;
  importPreviewData.forEach(function(item){
    var pid=item.商品ID||item.id||'';
    if(!pid)return;
    // 在产品表中找到该商品ID
    var found=D.filter(function(r){return r['商品ID']==pid});
    if(found.length===0)return;
    
    found.forEach(function(row){
      if(actType==='品牌新享'){
        if(accType!=='auto')row['品牌新享加速类型']=accType;
        else if(item.加速类型)row['品牌新享加速类型']=item.加速类型;
        if(item.费率)row['品牌新享费率%']=item.费率;
      }else{
        var key=colKey.k;
        var price=item.活动普惠券后价||item.活动价||item.供货价||item.换购到手价;
        if(price!=null)row[key]=parseFloat(price)||price;
      }
      // 更新活动数
      var cnt=0;
      [9,10,11,12,13,14].forEach(function(i){
        if(row[C[i].k]&&row[C[i].k]!=='')cnt++;
      });
      if(row[C[14].k]&&row[C[14].k].indexOf('新/老客')>=0)cnt++;
      row[C[16].k]=cnt;
      updated++;
    });
  });
  
  refresh();
  document.getElementById('importModal').classList.remove('on');
  document.getElementById('importJSON').value='';
  importPreviewData=[];
  alert('已合并 '+updated+' 条');
}

// 保存到线上 (通过 GitHub API 提交)
function saveAndPush(){
  if(D.length===0)return alert('无数据');
  var newJSON=JSON.stringify(D,null,2);
  
  // 使用 GitHub API 更新 data.json
  // 先获取当前文件的 SHA
  fetch('https://api.github.com/repos/wulonglu/price-matrix/contents/data.json')
    .then(function(r){return r.json()})
    .then(function(file){
      var sha=file.sha;
      // Base64 编码新内容
      var content=btoa(unescape(encodeURIComponent(newJSON)));
      var token=prompt('请输入 GitHub Token (只需repo权限):','');
      if(!token)return;
      
      return fetch('https://api.github.com/repos/wulonglu/price-matrix/contents/data.json',{
        method:'PUT',
        headers:{
          'Authorization':'token '+token,
          'Content-Type':'application/json'
        },
        body:JSON.stringify({
          message:'update campaign data',
          content:content,
          sha:sha,
          branch:'main'
        })
      });
    })
    .then(function(r){if(r)return r.json()})
    .then(function(result){
      var msg=result.commit?'已提交到 GitHub! (1分钟内刷新页面看最新数据)':'提交失败: '+(result.message||'未知错误');
      document.getElementById('saveResult').innerHTML=msg;
      document.getElementById('saveModal').classList.add('on');
    })
    .catch(function(e){
      document.getElementById('saveResult').innerHTML='错误: '+e.message+'<br><br>可以手动复制 data.json 发给我来推送。';
      document.getElementById('saveModal').classList.add('on');
    });
}

fetch('data.json?v='+Date.now()).then(function(r){return r.json()}).then(function(d){D=d;document.getElementById('ld').style.display='none';refresh()});
</script>
</body>
</html>
