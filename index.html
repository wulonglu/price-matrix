<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>价盘管理表</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","微软雅黑",sans-serif;background:#f5f6f8;color:#333}
.toolbar{background:#fff;padding:10px 20px;border-bottom:1px solid #e8e8e8;display:flex;gap:12px;align-items:center;flex-wrap:wrap;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.toolbar h1{font-size:17px;color:#1F4E79;margin-right:16px;white-space:nowrap}
.toolbar input,.toolbar select,.toolbar button{padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px}
.toolbar input{width:220px}
.toolbar button{background:#2E7D32;color:#fff;border-color:#2E7D32;cursor:pointer;font-weight:500}
.toolbar button:hover{background:#1B5E20}
.toolbar .btn-xlsx{background:#1F4E79}
.toolbar .btn-xlsx:hover{background:#153D61}
.stats{font-size:12px;color:#888;margin-left:auto;white-space:nowrap}
.table-wrap{overflow-x:auto;padding:12px}
table{border-collapse:collapse;font-size:12px;width:100%;min-width:1500px}
thead tr{position:sticky;top:56px;z-index:40}
thead th{padding:7px 9px;font-size:11px;font-weight:600;white-space:nowrap;border:1px solid #c0c5cc}
th.c-b{background:#1F4E79;color:#fff}
th.c-o{background:#C55A11;color:#fff}
th.c-g{background:#2E7D32;color:#fff}
th.c-6{background:#C55A11;color:#fff}
th.c-by{background:#D42020;color:#fff}
th.c-ms{background:#E05336;color:#fff}
th.c-ux{background:#7B2D8B;color:#fff}
th.c-lj{background:#1A73E8;color:#fff}
th.c-px{background:#00838F;color:#fff}
th.c-cn{background:#2E7D32;color:#fff}
tbody td{padding:5px 9px;border:1px solid #e8e8e8;text-align:center;white-space:nowrap}
tbody tr:nth-child(even){background:#f8f9fb}
tbody tr:hover{background:#e8f0fe}
td.l{text-align:left}
.loading{text-align:center;padding:60px;color:#888;font-size:14px}
</style>
</head>
<body>
<div class="toolbar">
  <h1>网店产品价盘管理表</h1>
  <button class="btn-xlsx" onclick="exportXLSX()">导出 Excel</button>
  <input id="s" placeholder="搜索商品ID/编码/规格..." oninput="f()">
  <select id="fc" onchange="f()">
    <option value="">全部活动列</option>
    <option value="9">618大促</option>
    <option value="10">百亿补贴</option>
    <option value="11">淘宝秒杀</option>
    <option value="12">天猫U先</option>
    <option value="13">超级立减</option>
    <option value="14">品牌新享</option>
  </select>
  <span class="stats" id="st"></span>
</div>
<div class="table-wrap">
  <table><thead><tr id="hrow"></tr></thead><tbody id="tb"></tbody></table>
</div>
<div class="loading" id="ld">正在加载数据...</div>

<script>
var C=[
  {k:'商品ID',l:'商品ID',c:'c-b'},{k:'SKUID',l:'SKUID',c:'c-b'},
  {k:'商品编码',l:'商品编码',c:'c-b'},{k:'商品规格名称',l:'商品规格名称',c:'c-b'},
  {k:'品牌供价(26年)',l:'品牌供价',c:'c-o',m:1},{k:'官旗售价',l:'官旗售价',c:'c-o',m:1},
  {k:'管控底价',l:'管控底价',c:'c-o',m:1},{k:'页面价格',l:'页面价格',c:'c-g',m:1},
  {k:'官方立减金额(15%)',l:'官方立减(15%)',c:'c-g',m:1},{k:'618大促券后价',l:'618大促券后价',c:'c-6',m:1},
  {k:'百亿补贴活动价',l:'百亿补贴活动价',c:'c-by',m:1},{k:'淘宝秒杀供货价',l:'淘宝秒杀供货价',c:'c-ms',m:1},
  {k:'天猫U先活动价',l:'天猫U先活动价',c:'c-ux',m:1},{k:'超级立减活动价',l:'超级立减活动价',c:'c-lj',m:1},
  {k:'品牌新享加速类型',l:'品牌新享-加速',c:'c-px'},{k:'品牌新享费率%',l:'品牌新享-费率',c:'c-px'},
  {k:'参与活动数',l:'参与活动数',c:'c-cn'}
];
var D=[];

function fm(v,c){
  if(v==null||v===undefined||v==='')return'';
  if(c.m&&typeof v==='number')return v.toFixed(2);
  return v;
}

function f(){
  var s=document.getElementById('s').value.toLowerCase(),fc=document.getElementById('fc').value,r=D;
  if(s)r=r.filter(function(d){return C.some(function(c){var v=d[c.k];return v!=null&&String(v).toLowerCase().indexOf(s)>=0})});
  if(fc){var ci=parseInt(fc);r=r.filter(function(d){return d[C[ci].k]!=null&&d[C[ci].k]!==''})}
  var h='';r.forEach(function(d){h+='<tr>';C.forEach(function(c,i){
    var v=fm(d[c.k],c),cl=i===3?'l':'';
    if(c.k==='品牌新享加速类型'&&String(v).indexOf('暂停')>=0)cl+=' pause';
    h+='<td class="'+cl+'">'+(c.m&&v!==''?'¥':'')+v+'</td>'
  });h+='</tr>'});
  document.getElementById('tb').innerHTML=h;
  document.getElementById('st').textContent=r.length+' / '+D.length+' 条';
}

// 导出 Excel（样式与在线表一致）
function exportXLSX(){
  if(D.length===0)return alert('数据未加载');
  var wsData=[];
  // 表头
  wsData.push(C.map(function(c){return c.l}));
  // 数据
  D.forEach(function(d){
    wsData.push(C.map(function(c){return c.m&&d[c.k]!=null?parseFloat(d[c.k])||d[c.k]:d[c.k]||''}));
  });
  var ws=XLSX.utils.aoa_to_sheet(wsData);
  
  // 列宽
  ws['!cols']=C.map(function(c,i){return i===3?{wch:28}:{wch:12}});
  
  ws['!autofilter']={ref:'A1:'+XLSX.utils.encode_col(C.length-1)+''+(D.length+1)};
  
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'价盘管理表');
  XLSX.writeFile(wb,'价盘管理表_'+new Date().toISOString().slice(0,10)+'.xlsx');
}

fetch('data.json').then(function(r){return r.json()}).then(function(d){
  D=d;document.getElementById('ld').style.display='none';
  document.getElementById('hrow').innerHTML=C.map(function(c){return'<th class="'+c.c+'">'+c.l+'</th>'}).join('');
  f();
}).catch(function(){document.getElementById('ld').textContent='数据加载失败，请刷新页面'});
</script>
</body>
</html>
