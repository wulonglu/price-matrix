<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>价盘管理表</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","微软雅黑",sans-serif;background:#f5f6f8;color:#333}
.toolbar{background:#fff;padding:10px 16px;border-bottom:1px solid #ddd;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.toolbar h1{font-size:17px;color:#1F4E79}
.toolbar input,.toolbar select,.toolbar button{padding:6px 10px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px}
.toolbar button{background:#1F4E79;color:#fff;border-color:#1F4E79;cursor:pointer}
.toolbar button:hover{opacity:.9}
.toolbar .btn-e{background:#2E7D32;border-color:#2E7D32}
.stats{font-size:12px;color:#888;margin-left:auto}
.wrap{overflow-x:auto;padding:10px}
#tbl{border-collapse:collapse;font-size:12px;width:100%;min-width:1500px}
#tbl th{padding:8px 9px;font-size:11px;font-weight:600;white-space:nowrap;border:1px solid #b8bcc4}
#tbl td{padding:6px 9px;border:1px solid #e0e0e0;white-space:nowrap}
#tbl th.cb{background:#1F4E79;color:#fff}
#tbl th.co{background:#C55A11;color:#fff}
#tbl th.cg{background:#2E7D32;color:#fff}
#tbl th.c6{background:#C55A11;color:#fff}
#tbl th.cby{background:#D42020;color:#fff}
#tbl th.cms{background:#E05336;color:#fff}
#tbl th.cux{background:#7B2D8B;color:#fff}
#tbl th.clj{background:#1A73E8;color:#fff}
#tbl th.cpx{background:#00838F;color:#fff}
#tbl th.ccn{background:#2E7D32;color:#fff}
#tbl tr:nth-child(even) td{background:#f8f9fb}
#tbl tr:nth-child(odd) td{background:#fff}
#tbl tr:hover td{background:#e8f0fe!important}
.ld{text-align:center;padding:40px;color:#888}
</style>
</head>
<body>
<div class="toolbar">
<h1>网店产品价盘管理表</h1>
<button class="btn-e" onclick="exportX()">导出Excel</button>
<input id="q" placeholder="搜索商品ID/编码/规格..." oninput="refresh()">
<select id="f" onchange="refresh()">
<option value="">全部活动</option><option value="9">618大促</option><option value="10">百亿补贴</option><option value="11">淘宝秒杀</option><option value="12">天猫U先</option><option value="13">超级立减</option><option value="14">品牌新享</option>
</select>
<span class="stats" id="st"></span>
</div>
<div class="wrap"><table id="tbl"><tbody></tbody></table></div>
<div class="ld" id="ld">正在加载数据...</div>

<script>
var C=[
{k:'商品ID',l:'商品ID',c:'cb'},{k:'SKUID',l:'SKUID',c:'cb'},{k:'商品编码',l:'商品编码',c:'cb'},{k:'商品规格名称',l:'商品规格名称',c:'cb'},
{k:'品牌供价(26年)',l:'品牌供价',c:'co',m:1},{k:'官旗售价',l:'官旗售价',c:'co',m:1},{k:'管控底价',l:'管控底价',c:'co',m:1},
{k:'页面价格',l:'页面价格',c:'cg',m:1},{k:'官方立减金额(15%)',l:'官方立减',c:'cg',m:1},{k:'618大促券后价',l:'618大促券后价',c:'c6',m:1},
{k:'百亿补贴活动价',l:'百亿补贴活动价',c:'cby',m:1},{k:'淘宝秒杀供货价',l:'淘宝秒杀供货价',c:'cms',m:1},{k:'天猫U先活动价',l:'天猫U先活动价',c:'cux',m:1},
{k:'超级立减活动价',l:'超级立减活动价',c:'clj',m:1},{k:'品牌新享加速类型',l:'品牌新享加速',c:'cpx'},{k:'品牌新享费率%',l:'品牌新享费率',c:'cpx'},
{k:'参与活动数',l:'参与数',c:'ccn'}];
var D=[];

function fmt(v,c){if(v==null||v==='')return'';if(c.m&&typeof v==='number')return v.toFixed(2);if(c.m&&!isNaN(parseFloat(v)))return parseFloat(v).toFixed(2);return v}

function refresh(){
var q=document.getElementById('q').value.toLowerCase(),fc=document.getElementById('f').value,rows=D;
if(q)rows=rows.filter(function(r){return C.some(function(c){var v=r[c.k];return v!=null&&String(v).toLowerCase().indexOf(q)>=0})});
if(fc){var ci=parseInt(fc);rows=rows.filter(function(r){return r[C[ci].k]!=null&&r[C[ci].k]!==''})}
var h='';
// 表头行
h+='<tr>';C.forEach(function(c){h+='<th class="'+c.c+'">'+c.l+'</th>'});h+='</tr>';
// 数据行
rows.forEach(function(r){h+='<tr>';C.forEach(function(c,i){var v=fmt(r[c.k],c);h+='<td>'+(c.m&&v!==''?'¥'+v:v)+'</td>'});h+='</tr>'});
document.getElementById('tbl').innerHTML='<tbody>'+h+'</tbody>';
document.getElementById('st').textContent=rows.length+' / '+D.length+' 条';
}

function exportX(){
if(D.length===0)return;
var a=[];a.push(C.map(function(c){return c.l}));
D.forEach(function(r){a.push(C.map(function(c){var v=r[c.k];if(v==null)return'';if(typeof v==='number')return v;if(!isNaN(parseFloat(v)))return parseFloat(v);return v}))});
var ws=XLSX.utils.aoa_to_sheet(a),wb=XLSX.utils.book_new();
ws['!cols']=C.map(function(c,i){return i===3?{wch:30}:{wch:14}});
var H={'cb':'1F4E79','co':'C55A11','cg':'2E7D32','c6':'C55A11','cby':'D42020','cms':'E05336','cux':'7B2D8B','clj':'1A73E8','cpx':'00838F','ccn':'2E7D32'};
var R=XLSX.utils.decode_range(ws['!ref']);
for(var i=R.s.c;i<=R.e.c;i++){var cr=XLSX.utils.encode_cell({r:0,c:i});ws[cr].s={fill:{patternType:'solid',fgColor:{rgb:H[C[i].c]},bgColor:{rgb:H[C[i].c]}},font:{color:{rgb:'FFFFFF'},bold:true},alignment:{horizontal:'center',vertical:'center'},border:{top:{style:'thin'},bottom:{style:'thin'},left:{style:'thin'},right:{style:'thin'}}}}
for(var j=1;j<=R.e.r;j++){var cr2=XLSX.utils.encode_cell({r:j,c:i});if(!ws[cr2])ws[cr2]={v:''};ws[cr2].s={fill:{patternType:'solid',fgColor:{rgb:j%2?'F8F9FB':'FFFFFF'}},alignment:{horizontal:i===3?'left':'center',vertical:'center'},border:{top:{style:'thin',color:{rgb:'CCCCCC'}},bottom:{style:'thin',color:{rgb:'CCCCCC'}},left:{style:'thin',color:{rgb:'CCCCCC'}},right:{style:'thin',color:{rgb:'CCCCCC'}}}}}
XLSX.utils.book_append_sheet(wb,ws,'价盘管理表');
XLSX.writeFile(wb,'价盘管理表_'+new Date().toISOString().slice(0,10)+'.xlsx');
}

fetch('data.json?v='+Date.now()).then(function(r){return r.json()}).then(function(d){D=d;document.getElementById('ld').style.display='none';refresh()});
</script>
</body>
</html>
